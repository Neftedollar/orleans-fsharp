<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orleans.FSharp — Idiomatic F# API for Microsoft Orleans">
  <defs>
    <!-- Page background -->
    <linearGradient id="page" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#162446"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.5" r="0.55">
      <stop stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo gradients (from orleans-fsharp-logo.svg) -->
    <linearGradient id="bg" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="core" x1="176" y1="176" x2="336" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="170" x2="342" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="title" x1="560" y1="0" x2="1180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#page)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="6" y="6" width="1268" height="628" rx="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- ===== Logo (left), 512 viewBox scaled & centered at y=320) ===== -->
  <g transform="translate(70,100) scale(0.86)">
    <circle cx="256" cy="256" r="208" fill="url(#bg)"/>
    <g stroke="#BFDBFE" stroke-opacity="0.7" stroke-width="12" stroke-linecap="round">
      <line x1="256" y1="156" x2="256" y2="98"/>
      <line x1="342.6" y1="206" x2="392.8" y2="177"/>
      <line x1="342.6" y1="306" x2="392.8" y2="335"/>
      <line x1="256" y1="356" x2="256" y2="414"/>
      <line x1="169.4" y1="306" x2="119.2" y2="335"/>
      <line x1="169.4" y1="206" x2="119.2" y2="177"/>
    </g>
    <g filter="url(#softShadow)">
      <circle cx="256" cy="82" r="26" fill="#E0F2FE"/>
      <circle cx="406.7" cy="169" r="26" fill="#C4B5FD"/>
      <circle cx="406.7" cy="343" r="26" fill="#E0F2FE"/>
      <circle cx="256" cy="430" r="26" fill="#C4B5FD"/>
      <circle cx="105.3" cy="343" r="26" fill="#E0F2FE"/>
      <circle cx="105.3" cy="169" r="26" fill="#C4B5FD"/>
    </g>
    <g filter="url(#softShadow)">
      <circle cx="256" cy="256" r="108" fill="url(#core)" stroke="url(#accent)" stroke-width="10"/>
    </g>
    <g filter="url(#softShadow)" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
      <path d="M216 184V328"/>
      <path d="M216 184H304"/>
      <path d="M216 248H286"/>
    </g>
    <circle cx="216" cy="184" r="8" fill="#67E8F9"/>
    <circle cx="304" cy="184" r="8" fill="#A78BFA"/>
    <circle cx="286" cy="248" r="8" fill="#A78BFA"/>
    <circle cx="216" cy="328" r="8" fill="#67E8F9"/>
    <circle cx="256" cy="256" r="146" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>
  </g>

  <!-- ===== Text block (right) ===== -->
  <g font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif">
    <!-- Version pill (top-right corner, clear of title) -->
    <rect x="1064" y="44" width="150" height="48" rx="24" fill="#2563EB"/>
    <text x="1139" y="77" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="'SF Mono',Menlo,Consolas,monospace">v3.0.0</text>

    <!-- Title -->
    <text x="556" y="248" font-size="92" font-weight="800" fill="url(#title)" letter-spacing="-1">Orleans.FSharp</text>

    <!-- Tagline -->
    <text x="560" y="312" font-size="36" font-weight="500" fill="#BFDBFE">Idiomatic F# API for Microsoft Orleans</text>

    <!-- Feature chips (monospace; widths sized to contain text within pills) -->
    <g font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="24" fill="#E2E8F0">
      <rect x="560" y="356" width="176" height="48" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="584" y="387" fill="#67E8F9">grain { }</text>

      <rect x="752" y="356" width="176" height="48" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="776" y="387">streaming</text>

      <rect x="948" y="356" width="250" height="48" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="972" y="387">event-sourcing</text>

      <rect x="560" y="418" width="176" height="48" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="584" y="449">reminders</text>

      <rect x="752" y="418" width="220" height="48" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="776" y="449">transactions</text>

      <rect x="992" y="418" width="150" height="48" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="1016" y="449" fill="#A78BFA">testing</text>
    </g>

    <!-- Footer line -->
    <text x="560" y="540" font-size="26" font-weight="500" fill="#94A3B8" font-family="'SF Mono',Menlo,Consolas,monospace">github.com/Neftedollar/orleans-fsharp</text>

    <!-- Orleans 10.x note -->
    <text x="560" y="586" font-size="22" font-weight="500" fill="#64748B">Full parity with Orleans 10.2 · .NET 10 · MIT</text>
  </g>
</svg>
