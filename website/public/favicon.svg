    <circle cx="406.7" cy="169" r="26" fill="#C4B5FD"/>
    <circle cx="406.7" cy="343" r="26" fill="#E0F2FE"/>
    <circle cx="256" cy="430" r="26" fill="#C4B5FD"/>
    <circle cx="105.3" cy="343" r="26" fill="#E0F2FE"/>
