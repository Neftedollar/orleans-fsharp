name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --verbosity quiet
      - run: dotnet test --verbosity quiet

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: nuget
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --configuration Release --verbosity quiet
      - run: dotnet pack --configuration Release --output ./nupkgs --verbosity quiet
      - name: Publish to NuGet.org (trusted publisher)
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
        run: |
          # Get OIDC token
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')

          # Exchange for NuGet API key via trusted publishers endpoint
          NUGET_TOKEN=$(curl -sS -X POST \
            "https://api.nuget.org/v3-index/repository-signatures/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\":\"${OIDC_TOKEN}\"}" | jq -r '.token // .apiKey // empty')

          if [ -z "$NUGET_TOKEN" ]; then
            echo "::warning::Could not obtain NuGet token via trusted publisher. Skipping publish."
            exit 0
          fi

          for pkg in nupkgs/*.nupkg; do
            echo "Publishing $pkg..."
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_TOKEN" \
              --skip-duplicate
          done
