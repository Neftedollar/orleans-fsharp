name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full integration at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --verbosity quiet
      - run: dotnet test tests/Orleans.FSharp.Tests --verbosity quiet

  quick-integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Run quick integration tests
        run: >
          dotnet test tests/Orleans.FSharp.Integration
          --filter "FullyQualifiedName~ConcurrencyTests|FullyQualifiedName~ErrorHandlingTests|FullyQualifiedName~ReentrancyIntegrationTests|FullyQualifiedName~TransactionConflictTests|FullyQualifiedName~FSharpBinaryCodecIntegration"
          --verbosity quiet

  full-integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      contains(github.event.head_commit.message, '[full-ci]')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Run all integration tests
        run: dotnet test tests/Orleans.FSharp.Integration --verbosity quiet

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: nuget
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --configuration Release --verbosity quiet
      - run: dotnet pack --configuration Release --output ./nupkgs --verbosity quiet

      - name: NuGet login (trusted publisher)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: Neftedollar

      - name: Push to NuGet.org
        run: |
          for pkg in nupkgs/*.nupkg; do
            echo "Publishing $pkg..."
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done
