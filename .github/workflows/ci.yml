name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --verbosity quiet
      - run: dotnet test --verbosity quiet

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: nuget
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --configuration Release --verbosity quiet
      - run: dotnet pack --configuration Release --output ./nupkgs --verbosity quiet
      - name: Get OIDC token and publish to NuGet.org
        run: |
          # Request OIDC token from GitHub
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value')

          # Exchange OIDC token for NuGet bearer token
          NUGET_TOKEN=$(curl -sS -X POST https://api.nuget.org/v3/trusted-publishers/token \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$OIDC_TOKEN\"}" | jq -r '.token')

          # Push packages with bearer token
          for pkg in nupkgs/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_TOKEN" \
              --skip-duplicate
          done
