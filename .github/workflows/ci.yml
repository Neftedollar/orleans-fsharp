name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --verbosity quiet
      - run: dotnet test --verbosity quiet

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: nuget
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build --configuration Release --verbosity quiet
      - run: dotnet pack --configuration Release --output ./nupkgs --verbosity quiet

      - name: Get OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api://AzureADTokenExchange');
            core.setOutput('token', token);
            core.setSecret(token);

      - name: Exchange OIDC for NuGet token
        id: nuget-token
        run: |
          RESPONSE=$(curl -sS -X POST \
            "https://api.nuget.org/v3/trusted-publishers/tokens" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${{ steps.oidc.outputs.token }}\"}")

          NUGET_TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')

          if [ -z "$NUGET_TOKEN" ]; then
            echo "Response: $RESPONSE"
            echo "::error::Failed to obtain NuGet token from trusted publisher endpoint"
            exit 1
          fi

          echo "::add-mask::$NUGET_TOKEN"
          echo "token=$NUGET_TOKEN" >> $GITHUB_OUTPUT

      - name: Push to NuGet.org
        run: |
          for pkg in nupkgs/*.nupkg; do
            echo "Publishing $pkg..."
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-token.outputs.token }}" \
              --skip-duplicate
          done
